application:
  name: generic-dev
  version: 0.0.1-ALPHA

spring:
  config:
    activate:
      on-profile: dev
  security:
    user:
      name: generic_service
      password: generic_service
    http:
      session-management:
        concurrency-control:
          max-sessions: 5

auth:
  cookie:
    http:
      only: true
    secure: true
    path: /
    domain: localhost
    samesite: Lax
    max:
      age: 60